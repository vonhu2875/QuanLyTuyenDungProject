{% extends 'layout/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            {% if succ_msg %}
            <div class="alert alert-success">{{succ_msg}}</div>
            {% endif %}

            {% if err_msg %}
            <div class="alert alert-danger">{{err_msg}}</div>
            {% endif %}

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-white border-bottom py-3">
                    <h4 class="mb-0 fw-bold text-dark text-center">Tải hồ sơ ứng tuyển</h4>
                </div>
                <div class="card-body p-4">
                    <h5 class="text-center mb-4">Vị trí: <span class="text-jobhub fw-bold">{{ job.title }}</span></h5>

                    <form action="{{ url_for('apply_job', job_id=job.id) }}" method="post" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Hồ sơ CV của bạn</label>
                            <div class="upload-area border border-2 border-dashed rounded-4 p-5 text-center bg-light"
                                 style="cursor: pointer; border-style: dashed !important;"
                                 onclick="document.getElementById('cv_file').click()">
                                <div class="upload-icon mb-3">
                                    <i class="bi bi-cloud-arrow-up text-jobhub" style="font-size: 3rem;"></i>
                                </div>
                                <p class="mb-1 fw-bold text-dark">Nhấn để tải lên hoặc kéo thả file vào đây</p>
                                <p class="text-muted small">Hỗ trợ định dạng .pdf (Tối đa 10MB)</p>
                                <input type="file" name="cv_file" id="cv_file" class="d-none" accept=".pdf" required
                                       onchange="updateFileName(this)">
                            </div>

                            <div id="file-name-display" class="mt-3 text-center text-success fw-bold small"></div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-jobhub btn-lg rounded-pill fw-bold">Xác nhận nộp hồ sơ</button>
                            <a href="{{ url_for('job_detail', job_id=job.id) }}" class="btn btn-outline-secondary rounded-pill">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Hàm hiện tên file khi chọn CV
    function updateFileName(input) {
        const display = document.getElementById('file-name-display');
        if (input.files && input.files[0]) {
            display.innerHTML = `<i class="bi bi-check-circle-fill me-1"></i> Đã chọn: ${input.files[0].name}`;
        }
    }

    // Tự động đóng thông báo sau 3 giây (Nếu có thông báo lỗi hiện ra)
    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alertElement) {
                if (typeof bootstrap !== 'undefined') {
                    const bsAlert = bootstrap.Alert.getOrCreateInstance(alertElement);
                    if (bsAlert) bsAlert.close();
                } else {
                    alertElement.style.display = 'none';
                }
            });
        }, 3000);
    });
</script>
{% endblock %}
