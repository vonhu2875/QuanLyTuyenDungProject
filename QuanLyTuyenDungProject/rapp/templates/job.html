{% extends 'layout/base.html' %}

{% block title %}Đăng tin tuyển dụng - JobHub N10{% endblock %}

{% block content %}
<div class="container mt-5 mb-5" style="max-width: 800px;">
    <div class="text-center mb-4">
        <h2 class="text-jobhub fw-bold text-uppercase">Đăng Tin Tuyển Dụng Mới</h2>
        <p class="text-muted small">Vui lòng điền đầy đủ thông tin chi tiết về vị trí cần tuyển</p>
    </div>

    {% if err_msg %}
    <div class="alert alert-danger">{{err_msg}}</div>
    {% endif %}

    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-4 p-md-5">
            <form method="post" action="/jobs">
                
                <div class="mb-4">
                    <label for="title" class="form-label fw-bold text-secondary">TIÊU ĐỀ TUYỂN DỤNG (Ít nhất 10 ký tự)</label>
                    <input type="text" class="form-control bg-light border-0 py-3 px-4" 
                           id="title" name="title" placeholder="Ví dụ: Lập trình viên Python Senior..." 
                           minlength="10" required style="border-radius: 8px;">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="salary" class="form-label fw-bold text-secondary">MỨC LƯƠNG (VNĐ)</label>
                        <input type="number" class="form-control bg-light border-0 py-3 px-4" 
                               id="salary" name="salary" placeholder="Ví dụ: 20000000" 
                               required style="border-radius: 8px;" min="0">
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="deadline" class="form-label fw-bold text-secondary">HẠN NỘP HỒ SƠ</label>
                        <input type="date" class="form-control bg-light border-0 py-3 px-4" 
                               id="deadline" name="deadline" required style="border-radius: 8px;">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="category_id" class="form-label fw-bold text-secondary">NGÀNH NGHỀ / LĨNH VỰC</label>
                    <select class="form-select bg-light border-0 py-3 px-4" id="category_id" name="category_id" required style="border-radius: 8px;">
                        <option value="" selected disabled>-- Chọn ngành nghề --</option>
                        {% for c in categories %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label fw-bold text-secondary">MÔ TẢ CHI TIẾT CÔNG VIỆC</label>
                    <textarea class="form-control bg-light border-0 px-4 py-3" id="description" name="description" 
                              rows="6" placeholder="Mô tả kỹ năng, yêu cầu, phúc lợi..." style="border-radius: 8px;"></textarea>
                </div>

                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-jobhub fw-bold py-3 shadow-sm" style="border-radius: 8px; font-size: 1.1rem;">
                        <i class="bi bi-megaphone me-2"></i> XÁC NHẬN ĐĂNG TIN
                    </button>
                    <a href="/" class="btn btn-link text-decoration-none mt-2">Hủy bỏ và quay lại</a>
                </div>

            </form>
        </div>
    </div>
</div>
