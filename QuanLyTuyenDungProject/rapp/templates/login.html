{% extends 'layout/base.html' %}

{% block title %}Đăng nhập - JobHub N10{% endblock %}

{% block content %}
<div class="container mt-5 mb-5" style="max-width: 500px;"> <div class="text-center mb-4">
        <h2 class="text-jobhub fw-bold">ĐĂNG NHẬP HỆ THỐNG</h2>
    </div>

    {% if err_msg %}
    <div class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-2"></i>{{err_msg}}
    </div>
    {% endif %}

    <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-4 p-md-5">
            <form method="post" action="/login">

                <div class="mb-4">
                    <label for="username" class="form-label">TÊN ĐĂNG NHẬP</label>
                    <input type="text"
                           class="form-control"
                           id="username" name="username"
                           placeholder="Nhập tên đăng nhập...">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">MẬT KHẨU</label>
                    <input type="password"
                           class="form-control"
                           id="password" name="password"
                           placeholder="Nhập mật khẩu...">
                </div>

                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-jobhub py-3">
                        ĐĂNG NHẬP
                    </button>
                </div>

                <div class="text-center mt-4 pt-3 border-top">
                    <span class="text-muted">Chưa có tài khoản?</span>
                    <a href="/register" class="text-jobhub fw-bold text-decoration-none ms-1">Đăng ký ngay</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
