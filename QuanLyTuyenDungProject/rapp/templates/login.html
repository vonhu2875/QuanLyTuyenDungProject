{% extends 'layout/base.html' %}

{% block title %}Đăng nhập - JobHub N10{% endblock %}

{% block content %}
<div class="container mt-5 mb-5" style="max-width: 750px;">

    <div class="text-center mb-4">
        <h2 class="text-primary fw-bold">ĐĂNG NHẬP HỆ THỐNG</h2>
    </div>

    {% if err_msg %}
    <div class="alert alert-danger">{{err_msg}}</div>
    {% endif %}

    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-4 p-md-5">
            <form method="post" action="/login">

                <div class="mb-4">
                    <label for="username" class="form-label fw-bold text-secondary small">TÊN ĐĂNG NHẬP</label>
                    <input type="text"
                           class="form-control bg-light border-0 shadow-none"
                           id="username" name="username"
                           placeholder="Nhập tên đăng nhập..."
                           style="height: 50px; border-radius: 6px; padding-left: 20px;" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-bold text-secondary small">MẬT KHẨU</label>
                    <input type="password"
                           class="form-control bg-light border-0 shadow-none"
                           id="password" name="password"
                           placeholder="Nhập mật khẩu..."
                           style="height: 50px; border-radius: 6px; padding-left: 20px;" required>
                </div>

                <div class="d-grid gap-2 col-8 mx-auto mt-5">
                    <button type="submit"
                            class="btn btn-primary fw-bold shadow-sm"
                            style="height: 50px; border-radius: 6px; letter-spacing: 1px;">
                        ĐĂNG NHẬP
                    </button>
                </div>

                <div class="text-center mt-4 pt-3 border-top">
                    <span class="text-muted">Chưa có tài khoản?</span>
                    <a href="/register" class="text-primary fw-bold text-decoration-none ms-1">Đăng ký ngay</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
