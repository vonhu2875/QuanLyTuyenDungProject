{% extends 'layout/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Tải hồ sơ ứng tuyển</h4>
                </div>
                <div class="card-body">
                    <h5>Vị trí: <span class="text-primary">{{ job.title }}</span></h5>
                    <hr>
                    
                    <form action="{{ url_for('apply_job_process', job_id=job.id) }}" method="post" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label for="cv_file" class="form-label fw-bold">Chọn file CV của bạn:</label>
                            <input type="file" name="cv_file" id="cv_file" class="form-control" accept=".pdf" required>
                            <div class="form-text text-danger">
                                * Yêu cầu: Định dạng PDF, dung lượng không quá 10MB.
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Xác nhận nộp hồ sơ</button>
                            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
